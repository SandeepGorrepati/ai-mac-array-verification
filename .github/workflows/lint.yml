name: RTL Lint
on:
  push: { branches: [ main ] }
  pull_request: { branches: [ main ] }
jobs:
  verilator-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator && verilator --version
      - name: Lint MAC array
        run: verilator --lint-only -Wall -Wno-WIDTHEXPAND -Wno-WIDTHTRUNC -Wno-DECLFILENAME rtl/mac_array_4x4.sv
